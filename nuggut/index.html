<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nuggut Side Quest</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
  </style>
</head>
<body>
<script>
'use strict';

const W = 800, H = 450;
const GROUND_Y = H - 16;

// ─── TEXTURE FACTORY ─────────────────────────────────────────────────────────
// All placeholder textures drawn with Phaser graphics.
// When real hand-drawn sprites are ready, replace generateTexture() calls
// with this.load.image() in BootScene.preload() and remove this function.

function buildTextures(scene) {

  function box(key, w, h, fill, border) {
    const g = scene.make.graphics({ add: false });
    g.fillStyle(fill);
    g.fillRect(0, 0, w, h);
    g.lineStyle(2, border || 0x000000);
    g.strokeRect(1, 1, w - 2, h - 2);
    g.generateTexture(key, w, h);
    g.destroy();
  }

  // ── Nuggut (box-shaped, grayscale shades indicate state) ──
  box('p_idle',   32, 48, 0xd4d4d4, 0x333333);
  box('p_walk1',  32, 48, 0xc8c8c8, 0x333333);
  box('p_walk2',  32, 48, 0xb8b8b8, 0x333333);
  box('p_jump',   32, 48, 0xe8e8e8, 0x333333);
  box('p_punch',  42, 48, 0xd4d4d4, 0x222222);
  box('p_super1', 46, 48, 0xffffff, 0x111111);
  box('p_super2', 42, 48, 0xdddddd, 0x222222);
  box('p_hurt',   32, 48, 0x888888, 0x444444);

  // ── Nugget Knight (taller, armored) ──
  box('k_walk1', 32, 52, 0xa4a4a4, 0x222222);
  box('k_walk2', 32, 52, 0x949494, 0x222222);
  box('k_hurt',  32, 52, 0x686868, 0x333333);

  // ── Nuggut Rat (low and wide) ──
  box('r_walk1', 38, 26, 0x888888, 0x333333);
  box('r_walk2', 38, 26, 0x787878, 0x333333);
  box('r_hurt',  38, 26, 0x585858, 0x444444);

  // ── King Slasher (big, dark) ──
  box('boss_idle',   68, 84, 0x585858, 0x111111);
  box('boss_walk1',  68, 84, 0x505050, 0x111111);
  box('boss_walk2',  68, 84, 0x606060, 0x111111);
  box('boss_rush',   76, 84, 0x686868, 0x000000);
  box('boss_hurt',   68, 84, 0x383838, 0x111111);

  // ── Tom (rescued brother, lighter) ──
  box('tom', 28, 44, 0xe8e8e8, 0x333333);

  // ── Spike ──
  {
    const g = scene.make.graphics({ add: false });
    g.fillStyle(0x888888);
    g.fillTriangle(0, 32, 16, 0, 32, 32);
    g.lineStyle(1, 0x444444);
    g.strokeTriangle(0, 32, 16, 0, 32, 32);
    g.generateTexture('spike', 32, 32);
    g.destroy();
  }

  // ── Ground tile ──
  {
    const g = scene.make.graphics({ add: false });
    g.fillStyle(0x555555);
    g.fillRect(0, 0, 32, 32);
    g.fillStyle(0x666666);
    g.fillRect(0, 0, 32, 6);    // top highlight strip
    g.lineStyle(1, 0x444444);
    g.strokeRect(0, 0, 32, 32);
    g.generateTexture('ground', 32, 32);
    g.destroy();
  }

  // ── Platform tile ──
  {
    const g = scene.make.graphics({ add: false });
    g.fillStyle(0x686868);
    g.fillRect(0, 0, 32, 16);
    g.fillStyle(0x787878);
    g.fillRect(0, 0, 32, 4);
    g.lineStyle(1, 0x888888);
    g.strokeRect(0, 0, 32, 16);
    g.generateTexture('platform', 32, 16);
    g.destroy();
  }

  // ── Heart icon ──
  {
    const g = scene.make.graphics({ add: false });
    g.fillStyle(0xffffff);
    g.fillCircle(7, 7, 6.5);
    g.fillCircle(17, 7, 6.5);
    g.fillTriangle(1, 9, 23, 9, 12, 22);
    g.generateTexture('heart', 24, 22);
    g.destroy();
  }

  // ── Background tile (dark sky + faint grid) ──
  {
    const g = scene.make.graphics({ add: false });
    g.fillStyle(0x0e0e0e);
    g.fillRect(0, 0, 128, H);
    // faint silhouette buildings
    g.fillStyle(0x171717);
    g.fillRect(0,  H - 200, 30, 200);
    g.fillRect(40, H - 160, 24, 160);
    g.fillRect(74, H - 220, 20, 220);
    g.fillRect(100, H - 140, 28, 140);
    g.generateTexture('bg', 128, H);
    g.destroy();
  }
}

// ─── ANIMATION FACTORY ───────────────────────────────────────────────────────
// Called once from BootScene so restarts never hit "key already exists" warnings.

function buildAnimations(scene) {
  const A = scene.anims;
  const mk = (key, frames, rate, repeat = -1) =>
    A.create({ key, frames: frames.map(k => ({ key: k })), frameRate: rate, repeat });

  // Nuggut — real sprites
  A.create({ key: 'p_walk', frames: A.generateFrameNumbers('nuggut_walk', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
  A.create({ key: 'p_idle', frames: A.generateFrameNumbers('nuggut_walk', { start: 0, end: 0 }), frameRate: 1,  repeat: -1 });
  A.create({ key: 'p_jump',  frames: [{ key: 'nuggut_jump'  }], frameRate: 1, repeat: 0 });
  A.create({ key: 'p_hurt',  frames: [{ key: 'nuggut_hurt'  }], frameRate: 1, repeat: 0 });
  // Punch: 2 frames (wind-up → extend)
  A.create({ key: 'p_punch', frames: A.generateFrameNumbers('nuggut_punch', { start: 0, end: 1 }), frameRate: 14, repeat: 0  });
  // Super: 2 dedicated frames cycling rapidly
  A.create({ key: 'p_super', frames: A.generateFrameNumbers('nuggut_super', { start: 0, end: 1 }), frameRate: 20, repeat: -1 });
  // Dead: single frame held
  A.create({ key: 'p_dead',  frames: [{ key: 'nuggut_dead' }], frameRate: 1, repeat: 0 });

  // Enemies — placeholder boxes
  mk('e_rat',    ['r_walk1', 'r_walk2'],       8);
  mk('e_knight', ['k_walk1', 'k_walk2'],       6);

  // Boss
  mk('boss_walk',  ['boss_walk1', 'boss_walk2'], 5);
  mk('boss_idle',  ['boss_idle'],                1);
  mk('boss_rush',  ['boss_rush'],                1);
}

// ─── BOOT SCENE ──────────────────────────────────────────────────────────────

class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }

  preload() {
    // Real sprite sheets — add more here as art is finished
    this.load.spritesheet('nuggut_walk', 'assets/nuggut-walk.png', {
      frameWidth: 128, frameHeight: 128,
    });
    this.load.spritesheet('nuggut_punch', 'assets/nuggut-punch.png', {
      frameWidth: 190, frameHeight: 128,
    });
    this.load.spritesheet('nuggut_super', 'assets/nuggut-super.png', {
      frameWidth: 200, frameHeight: 128,
    });
    this.load.image('nuggut_jump', 'assets/nuggut-jump.png');
    this.load.image('nuggut_hurt', 'assets/nuggut-hurt.png');
    this.load.image('nuggut_dead', 'assets/nuggut-dead.png');
  }

  create() {
    buildTextures(this);
    buildAnimations(this);   // animations are global — create once here, not in GameScene
    this.scene.start('TitleScene');
  }
}

// ─── TITLE SCENE ─────────────────────────────────────────────────────────────

class TitleScene extends Phaser.Scene {
  constructor() { super('TitleScene'); }

  create() {
    this.add.tileSprite(0, 0, W, H, 'bg').setOrigin(0, 0);

    this.add.text(W / 2, 72, 'NUGGUT SIDE QUEST', {
      fontFamily: 'monospace',
      fontSize: '40px',
      color: '#ffffff',
      stroke: '#000000',
      strokeThickness: 6,
    }).setOrigin(0.5);

    this.add.text(W / 2, 128, 'Save Tom from King Slasher!', {
      fontFamily: 'monospace',
      fontSize: '16px',
      color: '#999999',
    }).setOrigin(0.5);

    // Controls card
    this.add.rectangle(W / 2, 255, 360, 170, 0x1a1a1a).setOrigin(0.5);
    this.add.text(W / 2, 185, 'CONTROLS', {
      fontFamily: 'monospace', fontSize: '13px', color: '#666666',
    }).setOrigin(0.5);
    this.add.text(W / 2, 220, [
      '← →       Move',
      '↑  or  SPACE    Jump',
      'Z          Punch',
      'X          Super Attack  (3 uses)',
      '',
      'Jump on enemies to stomp them!',
    ].join('\n'), {
      fontFamily: 'monospace',
      fontSize: '14px',
      color: '#cccccc',
      lineSpacing: 6,
      align: 'left',
    }).setOrigin(0.5);

    const startTxt = this.add.text(W / 2, 370, 'PRESS SPACE TO START', {
      fontFamily: 'monospace', fontSize: '20px', color: '#ffffff',
    }).setOrigin(0.5);

    this.tweens.add({
      targets: startTxt, alpha: 0.15, duration: 550, yoyo: true, repeat: -1,
    });

    this.input.keyboard.once('keydown-SPACE', () => {
      this.scene.start('GameScene');
    });
  }
}

// ─── GAME SCENE ──────────────────────────────────────────────────────────────

class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  // ── create ──────────────────────────────────────────────────────────────────

  create() {
    this.WORLD_W = 7400;
    this.physics.world.setBounds(0, 0, this.WORLD_W, H + 300);
    this.cameras.main.setBounds(0, 0, this.WORLD_W, H);

    // Background
    this.add.tileSprite(0, 0, this.WORLD_W, H, 'bg').setOrigin(0, 0).setDepth(-1);

    // Level geometry
    this.groundGrp    = this.physics.add.staticGroup();
    this.platformGrp  = this.physics.add.staticGroup();
    this.spikeGrp     = this.physics.add.staticGroup();
    this.enemyGrp     = this.physics.add.group();

    this._buildGround();
    this._buildPlatforms();
    this._buildSpikes();
    this._buildEnemies();
    this._buildBoss();
    this._buildTom();

    // Player — scaled to 50% (128px art → 64px on screen)
    this.player = this.physics.add.sprite(80, H - 64, 'nuggut_walk');
    this.player.setScale(0.5);
    // Fix physics body to walk-frame dimensions so punch frames (190px wide) don't widen it.
    // Values are in sprite-pixel space (before scale): 80×112 → 40×56px on screen.
    // Centred in the 128px frame: offset x = (128-80)/2 = 24, offset y = 8
    this.player.setBodySize(80, 112, false);
    this.player.body.setOffset(24, 8);
    this.player.setCollideWorldBounds(true).setBounce(0);

    // Physics colliders (set up once here, NOT in update)
    this.physics.add.collider(this.player, this.groundGrp);
    this.physics.add.collider(this.player, this.platformGrp);
    this.physics.add.collider(this.enemyGrp, this.groundGrp);
    this.physics.add.collider(this.enemyGrp, this.platformGrp);
    this.physics.add.collider(this.boss, this.groundGrp);
    this.physics.add.collider(this.tom, this.groundGrp);

    // Spike touch → hurt
    this.physics.add.overlap(this.player, this.spikeGrp, () => {
      this._hurtPlayer();
    });

    // Enemy touch → stomp OR hurt
    this.physics.add.overlap(this.player, this.enemyGrp, (player, enemy) => {
      if (!enemy.active || !enemy.getData('alive')) return;
      const stomping = player.body.velocity.y > 80
                    && player.body.bottom < enemy.body.center.y + 10;
      if (stomping) {
        this._killEnemy(enemy);
        this.player.setVelocityY(-380);
      } else {
        this._hurtPlayer();
      }
    });

    // Boss touch → hurt
    this.physics.add.overlap(this.player, this.boss, () => {
      if (this.boss.getData('alive')) this._hurtPlayer();
    });

    // Camera
    this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

    // Input
    this.cursors  = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.zKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z);
    this.xKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.X);

    // State
    this.health     = 3;
    this.superUses  = 3;
    this.score      = 0;
    this.facing     = 1;         // 1=right, -1=left
    this.pState     = 'idle';    // idle | walking | jumping | punching | super | hurt
    this.stateTimer = 0;
    this.hurtTimer  = 0;
    this.hurtFlash  = 0;
    this.ended      = false;
    this.bossShown  = false;

    this._buildUI();
  }

  // ── level builders ──────────────────────────────────────────────────────────

  _buildGround() {
    // Two short gaps: ~x=2016 and ~x=3936 (3 tiles each = 96px)
    const GAP1_START = 2016, GAP1_END = 2112;
    const GAP2_START = 3936, GAP2_END = 4032;
    for (let x = 0; x < this.WORLD_W; x += 32) {
      if (x >= GAP1_START && x < GAP1_END) continue;
      if (x >= GAP2_START && x < GAP2_END) continue;
      this.groundGrp.create(x + 16, GROUND_Y, 'ground');
    }
  }

  _buildPlatforms() {
    // [x, y, tileCount]  — two platforms bridge over the gaps
    const defs = [
      [448,  H - 160, 4],
      [800,  H - 200, 3],
      [1152, H - 160, 5],
      [1600, H - 200, 4],
      [1920, H - 160, 5],   // bridge over gap 1
      [2240, H - 200, 4],
      [2688, H - 160, 4],
      [3072, H - 200, 3],
      [3488, H - 160, 5],
      [3840, H - 160, 5],   // bridge over gap 2
      [4256, H - 200, 4],
      [4608, H - 160, 3],
    ];
    defs.forEach(([x, y, n]) => {
      for (let i = 0; i < n; i++) {
        this.platformGrp.create(x + i * 32 + 16, y, 'platform');
      }
    });
  }

  _buildSpikes() {
    [736, 768, 1504, 1536, 2336, 2368, 3264, 3296, 4960, 4992].forEach(x => {
      this.spikeGrp.create(x + 16, H - 48, 'spike');
    });
  }

  _buildEnemies() {
    const defs = [
      ['rat',    480], ['rat',    640],
      ['knight', 960],
      ['rat',   1120], ['rat',   1280],
      ['knight',1632], ['knight',1792],
      ['rat',   2240], ['rat',   2400],
      ['knight',2752],
      ['rat',   2944], ['knight',3104],
      ['rat',   3360], ['knight',3552],
      ['rat',   3776], ['rat',   3968],
      ['knight',4160], ['knight',4352],
      ['rat',   4544], ['knight',4736],
      // Dense pack approaching boss
      ['rat',   4960], ['knight',5120],
      ['rat',   5280], ['knight',5440],
    ];
    defs.forEach(([type, x]) => this._spawnEnemy(type, x));
  }

  _spawnEnemy(type, x) {
    const isRat = type === 'rat';
    const key   = isRat ? 'r_walk1' : 'k_walk1';
    const ey    = isRat ? H - 29 : H - 42;
    const e     = this.enemyGrp.create(x, ey, key);
    e.setData('type', type);
    e.setData('alive', true);
    e.setData('health', isRat ? 1 : 2);
    e.setCollideWorldBounds(true).setBounce(0);
    return e;
  }

  _buildBoss() {
    this.boss = this.physics.add.sprite(5900, H - 120, 'boss_idle');
    this.boss.setCollideWorldBounds(true).setBounce(0);
    this.boss.setData('alive', true);
    this.boss.setData('health', 8);
    this.boss.setData('phase', 'patrol');   // patrol | rush | pause
    this.boss.setData('phaseTimer', 2.0);
  }

  _buildTom() {
    this.tom = this.physics.add.sprite(6900, H - 80, 'tom');
    this.tom.setCollideWorldBounds(true);
    this.tom.setData('rescued', false);
  }

  // ── animations ──────────────────────────────────────────────────────────────

  // ── UI ──────────────────────────────────────────────────────────────────────

  _buildUI() {
    const SF = 0;  // scrollFactor shorthand value
    const D  = 20; // depth

    // Hearts
    this.uiHearts = Array.from({ length: 3 }, (_, i) =>
      this.add.image(22 + i * 32, 22, 'heart')
        .setScrollFactor(SF).setDepth(D)
    );

    // Super uses
    this.uiSuper = this.add.text(W - 12, 10, '', {
      fontFamily: 'monospace', fontSize: '14px', color: '#ffffff',
    }).setScrollFactor(SF).setDepth(D).setOrigin(1, 0);

    // Score
    this.uiScore = this.add.text(W / 2, 10, 'SCORE: 0', {
      fontFamily: 'monospace', fontSize: '14px', color: '#bbbbbb',
    }).setScrollFactor(SF).setDepth(D).setOrigin(0.5, 0);

    // Controls hint
    this.add.text(10, H - 18, '← → move   ↑/SPC jump   Z punch   X super', {
      fontFamily: 'monospace', fontSize: '11px', color: '#444444',
    }).setScrollFactor(SF).setDepth(D);

    // Boss health bar (hidden until boss is near)
    this.bossBarBg  = this.add.rectangle(W / 2, H - 28, 304, 20, 0x1a1a1a)
      .setScrollFactor(SF).setDepth(D).setVisible(false);
    this.bossBarFg  = this.add.rectangle(W / 2 - 150, H - 28, 0, 16, 0x999999)
      .setScrollFactor(SF).setDepth(D).setOrigin(0, 0.5).setVisible(false);
    this.bossBarLbl = this.add.text(W / 2, H - 50, 'KING SLASHER', {
      fontFamily: 'monospace', fontSize: '12px', color: '#777777',
    }).setScrollFactor(SF).setDepth(D).setOrigin(0.5, 0).setVisible(false);
  }

  _refreshUI() {
    // Hearts
    this.uiHearts.forEach((h, i) => h.setAlpha(i < this.health ? 1 : 0.15));

    // Super
    const s = this.superUses;
    this.uiSuper.setText('SUPER: ' + '■'.repeat(s) + '□'.repeat(3 - s));

    // Score
    this.uiScore.setText('SCORE: ' + this.score);

    // Boss bar
    const alive = this.boss.getData('alive');
    const dist  = Phaser.Math.Distance.Between(
      this.player.x, this.player.y, this.boss.x, this.boss.y
    );
    const show = alive && dist < 1000;
    [this.bossBarBg, this.bossBarFg, this.bossBarLbl].forEach(o => o.setVisible(show));
    if (show) {
      const pct = this.boss.getData('health') / 8;
      this.bossBarFg.setSize(300 * pct, 16);
    }
  }

  // ── update ──────────────────────────────────────────────────────────────────

  update(time, delta) {
    if (this.ended) return;
    const dt = delta / 1000;

    this._updatePlayer(dt, time);
    this._updateEnemies();
    this._updateBoss(dt);
    this._refreshUI();

    // Victory trigger: boss dead + player reaches Tom
    if (!this.tom.getData('rescued') && !this.boss.getData('alive')) {
      const d = Phaser.Math.Distance.Between(
        this.player.x, this.player.y, this.tom.x, this.tom.y
      );
      if (d < 130) this._triggerVictory();
    }

    // Fall into pit
    if (this.player.y > H + 100) this._hurtPlayer(true);
  }

  // ── player logic ────────────────────────────────────────────────────────────

  _updatePlayer(dt, time) {
    const onGround = this.player.body.blocked.down;

    // Hurt flash timer
    if (this.hurtTimer > 0) {
      this.hurtTimer -= dt;
      this.hurtFlash += dt;
      this.player.setAlpha(Math.sin(this.hurtFlash * 20) > 0 ? 1 : 0.3);
      if (this.hurtTimer <= 0) {
        this.pState   = 'idle';
        this.hurtTimer = 0;
        this.player.setAlpha(1);
      }
    }

    // State timer (clears punching/super state)
    if (this.stateTimer > 0) {
      this.stateTimer -= dt;
      if (this.stateTimer <= 0) {
        if (this.pState === 'punching' || this.pState === 'super') {
          this.pState = 'idle';
        }
      }
    }

    const attacking = this.pState === 'punching' || this.pState === 'super';
    const hurt      = this.pState === 'hurt';

    // Horizontal movement (allowed while attacking)
    if (!hurt) {
      if (this.cursors.left.isDown) {
        this.player.setVelocityX(-200);
        this.facing = -1;
        this.player.flipX = true;
      } else if (this.cursors.right.isDown) {
        this.player.setVelocityX(200);
        this.facing = 1;
        this.player.flipX = false;
      } else if (!attacking) {
        this.player.setVelocityX(0);
      }
    }

    // Jump
    const jumpPressed = Phaser.Input.Keyboard.JustDown(this.cursors.up)
                     || Phaser.Input.Keyboard.JustDown(this.spaceKey);
    if (jumpPressed && onGround && !hurt) {
      this.player.setVelocityY(-530);
    }

    // Punch (Z)
    if (Phaser.Input.Keyboard.JustDown(this.zKey) && !attacking && !hurt) {
      this.pState     = 'punching';
      this.stateTimer = 0.26;
      this.player.anims.play('p_punch', true);
      this._executePunch(1, 72);
    }

    // Super attack (X)
    if (Phaser.Input.Keyboard.JustDown(this.xKey) && !attacking && !hurt && this.superUses > 0) {
      this.superUses--;
      this.pState     = 'super';
      this.stateTimer = 0.70;
      this.player.anims.play('p_super', true);
      [0, 120, 240, 360, 520].forEach(ms =>
        this.time.delayedCall(ms, () => {
          if (!this.ended) this._executePunch(2, 108);
        })
      );
    }

    // Animation — re-check pState so a punch/super triggered THIS frame isn't overridden
    const nowAttacking = this.pState === 'punching' || this.pState === 'super';
    if (!nowAttacking) {
      if (!onGround) {
        this.player.anims.play('p_jump', true);
      } else if (hurt) {
        this.player.anims.play('p_hurt', true);
      } else if (Math.abs(this.player.body.velocity.x) > 10) {
        this.player.anims.play('p_walk', true);
      } else {
        this.player.anims.play('p_idle', true);
      }
    }
  }

  _executePunch(damage, range) {
    // Hit enemies
    this.enemyGrp.getChildren().forEach(e => {
      if (!e.active || !e.getData('alive')) return;
      const dx = (e.x - this.player.x) * this.facing;
      const dy = Math.abs(e.y - this.player.y);
      if (dx > 0 && dx < range && dy < 56) {
        this._damageEnemy(e, damage);
      }
    });

    // Hit boss
    if (this.boss.getData('alive')) {
      const dx = (this.boss.x - this.player.x) * this.facing;
      const dy = Math.abs(this.boss.y - this.player.y);
      if (dx > 0 && dx < range + 48 && dy < 64) {
        this._damageBoss(damage);
      }
    }
  }

  // ── enemies ─────────────────────────────────────────────────────────────────

  _updateEnemies() {
    this.enemyGrp.getChildren().forEach(e => {
      if (!e.active || !e.getData('alive')) return;

      // Only activate when player is within 700px
      const dist = Math.abs(e.x - this.player.x);
      if (dist > 700) return;

      // Chase player
      const dir = e.x > this.player.x ? -1 : 1;
      e.setVelocityX(dir * 72);
      e.flipX = dir < 0;

      const anim = e.getData('type') === 'rat' ? 'e_rat' : 'e_knight';
      e.anims.play(anim, true);
    });
  }

  _damageEnemy(e, damage) {
    const hp = e.getData('health') - damage;
    e.setData('health', hp);
    e.setVelocityX(this.facing * 220);
    e.setVelocityY(-180);
    if (hp <= 0) this._killEnemy(e);
  }

  _killEnemy(e) {
    if (!e.active || !e.getData('alive')) return;
    e.setData('alive', false);
    e.setVelocityY(-300);
    e.setVelocityX(this.facing * 160);
    e.setAlpha(0.45);
    this.score += e.getData('type') === 'rat' ? 100 : 200;
    this.time.delayedCall(700, () => { if (e.active) e.destroy(); });
  }

  // ── boss ────────────────────────────────────────────────────────────────────

  _updateBoss(dt) {
    if (!this.boss.getData('alive')) return;

    const dist = Phaser.Math.Distance.Between(
      this.player.x, this.player.y, this.boss.x, this.boss.y
    );
    if (dist > 1100) return;

    let phase = this.boss.getData('phase');
    let timer = this.boss.getData('phaseTimer') - dt;
    this.boss.setData('phaseTimer', timer);

    const toPlayer = this.player.x > this.boss.x ? 1 : -1;

    if (phase === 'patrol') {
      this.boss.anims.play('boss_walk', true);
      this.boss.setVelocityX(toPlayer * 90);
      this.boss.flipX = toPlayer < 0;
      if (dist < 220 && timer <= 0) {
        this.boss.setData('phase', 'rush');
        this.boss.setData('phaseTimer', 1.1);
      }
    } else if (phase === 'rush') {
      this.boss.anims.play('boss_rush', true);
      this.boss.setVelocityX(toPlayer * 240);
      this.boss.flipX = toPlayer < 0;
      if (timer <= 0) {
        this.boss.setVelocityX(0);
        this.boss.setData('phase', 'pause');
        this.boss.setData('phaseTimer', 1.2);
      }
    } else if (phase === 'pause') {
      this.boss.anims.play('boss_idle', true);
      this.boss.setVelocityX(0);
      if (timer <= 0) {
        this.boss.setData('phase', 'patrol');
        this.boss.setData('phaseTimer', 2.0);
      }
    }
  }

  _damageBoss(damage) {
    if (!this.boss.getData('alive')) return;
    const hp = Math.max(0, this.boss.getData('health') - damage);
    this.boss.setData('health', hp);
    this.boss.setVelocityX(-this.facing * 260);
    this.boss.setVelocityY(-180);
    if (hp <= 0) this._killBoss();
  }

  _killBoss() {
    this.boss.setData('alive', false);
    this.boss.setVelocityY(-440);
    this.boss.setVelocityX(280);
    this.boss.setAlpha(0.4);
    this.score += 1000;

    this.time.delayedCall(800, () => {
      if (this.boss.active) this.boss.destroy();
      [this.bossBarBg, this.bossBarFg, this.bossBarLbl].forEach(o => o.setVisible(false));

      const msg = this.add.text(W / 2, H / 2 - 18, 'KING SLASHER DEFEATED!', {
        fontFamily: 'monospace', fontSize: '24px', color: '#ffffff',
        stroke: '#000', strokeThickness: 4,
      }).setScrollFactor(0).setDepth(30).setOrigin(0.5);

      const hint = this.add.text(W / 2, H / 2 + 18, '→  Find Tom!', {
        fontFamily: 'monospace', fontSize: '16px', color: '#aaaaaa',
      }).setScrollFactor(0).setDepth(30).setOrigin(0.5);

      this.time.delayedCall(2400, () => { msg.destroy(); hint.destroy(); });
    });
  }

  // ── player damage / death ───────────────────────────────────────────────────

  _hurtPlayer(fallDeath = false) {
    if (this.hurtTimer > 0) return;   // already invincible

    this.health--;
    this.pState    = 'hurt';
    this.hurtTimer = 1.8;
    this.hurtFlash = 0;
    this.player.anims.play('p_hurt', true);

    if (fallDeath) {
      // Teleport back to safe ground, no knockback
      const safeX = Math.max(80, this.player.x - 160);
      this.player.setPosition(safeX, H - 100);
      this.player.setVelocity(0, 0);
    } else {
      this.player.setVelocityY(-320);
      this.player.setVelocityX(-this.facing * 170);
    }

    if (this.health <= 0) this._triggerGameOver();
  }

  // ── endings ─────────────────────────────────────────────────────────────────

  _triggerGameOver() {
    this.ended = true;
    this.pState = 'dead';
    this.player.setVelocityX(0);
    this.player.anims.play('p_dead', true);

    this.time.delayedCall(350, () => {
      this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.78)
        .setScrollFactor(0).setDepth(40);
      this.add.text(W / 2, H / 2 - 50, 'GAME OVER', {
        fontFamily: 'monospace', fontSize: '52px', color: '#ffffff',
        stroke: '#000', strokeThickness: 6,
      }).setScrollFactor(0).setDepth(41).setOrigin(0.5);
      this.add.text(W / 2, H / 2 + 14, 'Score: ' + this.score, {
        fontFamily: 'monospace', fontSize: '20px', color: '#888888',
      }).setScrollFactor(0).setDepth(41).setOrigin(0.5);
      this.add.text(W / 2, H / 2 + 54, 'Press SPACE to try again', {
        fontFamily: 'monospace', fontSize: '16px', color: '#555555',
      }).setScrollFactor(0).setDepth(41).setOrigin(0.5);

      this.input.keyboard.once('keydown-SPACE', () => this.scene.restart());
    });
  }

  _triggerVictory() {
    this.tom.setData('rescued', true);
    this.ended = true;
    this.player.setVelocityX(0);

    this.time.delayedCall(500, () => {
      this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.82)
        .setScrollFactor(0).setDepth(40);
      this.add.text(W / 2, H / 2 - 80, 'YOU SAVED TOM!', {
        fontFamily: 'monospace', fontSize: '44px', color: '#ffffff',
        stroke: '#000000', strokeThickness: 6,
      }).setScrollFactor(0).setDepth(41).setOrigin(0.5);
      this.add.text(W / 2, H / 2 - 16, 'NUGGUT SIDE QUEST', {
        fontFamily: 'monospace', fontSize: '20px', color: '#888888',
      }).setScrollFactor(0).setDepth(41).setOrigin(0.5);
      this.add.text(W / 2, H / 2 + 16, 'COMPLETE!', {
        fontFamily: 'monospace', fontSize: '20px', color: '#aaaaaa',
      }).setScrollFactor(0).setDepth(41).setOrigin(0.5);
      this.add.text(W / 2, H / 2 + 58, 'FINAL SCORE: ' + this.score, {
        fontFamily: 'monospace', fontSize: '26px', color: '#ffffff',
        stroke: '#000', strokeThickness: 3,
      }).setScrollFactor(0).setDepth(41).setOrigin(0.5);
      this.add.text(W / 2, H / 2 + 104, 'Press SPACE to play again', {
        fontFamily: 'monospace', fontSize: '14px', color: '#555555',
      }).setScrollFactor(0).setDepth(41).setOrigin(0.5);

      this.input.keyboard.once('keydown-SPACE', () => this.scene.start('TitleScene'));
    });
  }
}

// ─── LAUNCH ──────────────────────────────────────────────────────────────────

// Destroy any previous instance left by hot-reload so animations aren't duplicated
if (window.__game) { window.__game.destroy(true); }
window.__game = new Phaser.Game({
  type: Phaser.AUTO,
  width: W,
  height: H,
  backgroundColor: '#0e0e0e',
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 680 }, debug: false },
  },
  scene: [BootScene, TitleScene, GameScene],
});
</script>
</body>
</html>
